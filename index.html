<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>26년 직책자 평가 시스템</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
<style>
:root {
  --primary:#1a3a5c; --primary-light:#2c5f8a; --accent:#e8b84b; --accent-light:#f5d78e;
  --success:#2e7d32; --success-light:#e8f5e9; --danger:#c62828; --danger-light:#ffebee;
  --warning:#f57f17; --warning-light:#fff8e1; --bg:#f4f6f9; --surface:#fff;
  --border:#dde2ea; --text:#1a2332; --text-muted:#6b7a8d; --sidebar-w:230px; --header-h:56px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Malgun Gothic','맑은 고딕',sans-serif;background:var(--bg);color:var(--text);font-size:13px;}

/* ══ LOGIN ══ */
/* ══ LOGIN - 이투스에듀 그룹웨어 스타일 ══ */
#login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:#f0f4f8;}
.login-top-bar{width:100%;max-width:480px;padding:24px 0 20px;display:flex;align-items:center;gap:10px;}
.login-etoos-logo{display:flex;align-items:center;gap:10px;}
.login-etoos-icon{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#1a7abf,#2db36f);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#fff;font-style:italic;flex-shrink:0;}
.login-etoos-name{font-size:18px;font-weight:800;color:#1a3a5c;letter-spacing:-0.3px;}
.login-box{background:#fff;border:1.5px solid #c8d8e8;border-radius:4px;padding:36px 40px 30px;width:480px;max-width:96vw;}
.login-heading{display:flex;align-items:baseline;gap:14px;margin-bottom:28px;}
.login-heading .lg-title{font-size:28px;font-weight:300;color:#1a7abf;letter-spacing:-0.5px;}
.login-heading .lg-sub{font-size:13px;color:#6b7a8d;}
.login-fields-row{display:flex;gap:10px;align-items:flex-end;}
.login-fields-col{flex:1;display:flex;flex-direction:column;gap:8px;}
.login-form input{width:100%;padding:10px 14px;border:1px solid #b0c4d8;border-radius:3px;font-size:14px;color:#222;background:#f5f9fc;transition:border-color .15s,background .15s;font-family:inherit;box-sizing:border-box;}
.login-form input:focus{outline:none;border-color:#1a7abf;background:#fff;}
.login-form input::placeholder{color:#aab5c0;}
.login-btn{padding:0 32px;height:78px;background:#1a7abf;color:#fff;border:none;border-radius:3px;font-size:15px;font-weight:700;cursor:pointer;transition:background .15s;font-family:inherit;white-space:nowrap;flex-shrink:0;}
.login-btn:hover{background:#1565a3;}
.login-err{color:#c62828;font-size:12px;margin-top:10px;min-height:18px;}
.login-bottom{margin-top:20px;padding-top:16px;border-top:1px solid #e8edf2;text-align:center;}

/* ══ APP ══ */
#app-screen{display:none;}
.layout{display:flex;min-height:100vh;}
.sidebar{width:var(--sidebar-w);background:var(--primary);position:fixed;top:0;left:0;height:100vh;display:flex;flex-direction:column;z-index:100;}
.sidebar-logo{padding:16px;border-bottom:1px solid rgba(255,255,255,.1);}
.sidebar-logo .year{font-size:10px;color:rgba(255,255,255,.5);letter-spacing:1px;}
.sidebar-logo .title{font-size:14px;font-weight:700;color:#fff;margin-top:2px;}
.sidebar-logo .sub{font-size:11px;color:var(--accent-light);margin-top:1px;}
.nav{flex:1;padding:8px 0;overflow-y:auto;}
.nav-section{padding:10px 16px 4px;font-size:10px;color:rgba(255,255,255,.35);letter-spacing:1px;text-transform:uppercase;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;color:rgba(255,255,255,.7);font-size:13px;transition:all .15s;border-left:3px solid transparent;}
.nav-item:hover{background:rgba(255,255,255,.05);color:#fff;}
.nav-item.active{background:rgba(255,255,255,.1);color:#fff;border-left-color:var(--accent);}
.nav-icon{font-size:15px;width:20px;text-align:center;}
.sidebar-bottom{padding:12px 16px;border-top:1px solid rgba(255,255,255,.1);}
.user-badge{background:rgba(232,184,75,.15);border:1px solid rgba(232,184,75,.3);border-radius:8px;padding:10px 12px;}
.user-badge .role-tag{font-size:10px;color:var(--accent-light);display:flex;align-items:center;gap:4px;}
.user-badge .uname{font-size:13px;color:#fff;font-weight:700;margin-top:2px;}
.user-badge .uid{font-size:10px;color:rgba(255,255,255,.5);margin-top:1px;}
.logout-btn{width:100%;margin-top:8px;padding:7px;background:rgba(255,255,255,.08);color:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.15);border-radius:6px;font-size:11px;cursor:pointer;font-family:inherit;transition:all .15s;}
.logout-btn:hover{background:rgba(255,255,255,.15);color:#fff;}

.main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;}
.topbar{height:var(--header-h);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px;position:sticky;top:0;z-index:50;}
.topbar-title{font-size:15px;font-weight:700;color:var(--primary);}
.topbar-sub{font-size:12px;color:var(--text-muted);}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;}
.badge-blue{background:#e3eef8;color:#1a3a5c;}
.badge-green{background:var(--success-light);color:var(--success);}
.badge-orange{background:var(--warning-light);color:var(--warning);}
.badge-red{background:var(--danger-light);color:var(--danger);}
.badge-gold{background:#fff8e1;color:#b7791f;}
.badge-purple{background:#f3e8ff;color:#6b21a8;}
.content{flex:1;padding:24px;}
.page{display:none;}.page.active{display:block;}

/* ══ CARDS ══ */
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:16px;}
.card-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.card-title{font-size:14px;font-weight:700;color:var(--primary);}
.card-body{padding:18px;}

/* ══ STATS ══ */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;}
.stat-label{font-size:11px;color:var(--text-muted);margin-bottom:6px;}
.stat-val{font-size:26px;font-weight:700;color:var(--primary);line-height:1;}
.stat-sub{font-size:11px;color:var(--text-muted);margin-top:4px;}
.progress-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:6px;}
.progress-fill{height:100%;border-radius:3px;background:var(--accent);transition:width .3s;}

/* ══ TABLE ══ */
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{background:#f0f3f8;color:var(--primary);font-weight:700;padding:9px 10px;text-align:center;border:1px solid var(--border);white-space:nowrap;font-size:11px;}
td{padding:7px 10px;border:1px solid var(--border);text-align:center;vertical-align:middle;}
tr:hover td{background:#f8f9fc;}
.td-left{text-align:left;}
.grade-S{color:#c62828;font-weight:700;} .grade-A{color:#1565c0;font-weight:700;}
.grade-B{color:#2e7d32;font-weight:700;} .grade-C{color:#e65100;font-weight:700;}
.grade-D,.grade-E{color:#6b7a8d;font-weight:700;}
.incentive-y{color:var(--danger);font-weight:600;} .incentive-n{color:var(--text-muted);}

/* ══ EVAL ══ */
select.grade-sel{border:1px solid var(--border);border-radius:4px;padding:4px 5px;font-size:12px;font-weight:600;color:var(--primary);background:var(--surface);width:80px;}
.score-display{font-size:14px;font-weight:700;color:var(--primary);}
textarea.comment{width:100%;border:1px solid var(--border);border-radius:4px;padding:6px 8px;font-size:11px;resize:vertical;min-height:52px;font-family:inherit;color:var(--text);}
textarea.comment:focus{outline:none;border-color:var(--primary-light);}
.grade-legend{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.grade-pill{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;font-size:11px;border:1px solid var(--border);background:var(--surface);}
.grade-dot{width:8px;height:8px;border-radius:50%;}

/* ══ BUTTONS ══ */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .15s;font-family:inherit;}
.btn-primary{background:var(--primary);color:#fff;} .btn-primary:hover{background:var(--primary-light);}
.btn-accent{background:var(--accent);color:var(--primary);} .btn-accent:hover{background:#d4a83a;}
.btn-success{background:var(--success);color:#fff;}
.btn-danger{background:var(--danger);color:#fff;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text);} .btn-outline:hover{background:var(--bg);}
.btn-sm{padding:5px 11px;font-size:11px;}

/* ══ ALERTS ══ */
.alert{padding:10px 14px;border-radius:8px;font-size:12px;margin-bottom:12px;}
.alert-info{background:#e3eef8;color:#1a3a5c;border-left:3px solid #2c5f8a;}
.alert-warning{background:var(--warning-light);color:var(--warning);border-left:3px solid var(--warning);}
.alert-success{background:var(--success-light);color:var(--success);border-left:3px solid var(--success);}

/* ══ MODAL ══ */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;align-items:center;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal{background:var(--surface);border-radius:12px;padding:24px;width:600px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.modal-title{font-size:16px;font-weight:700;color:var(--primary);margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border);}
.form-row{margin-bottom:12px;}
.form-label{font-size:11px;font-weight:700;color:var(--text-muted);margin-bottom:4px;display:block;text-transform:uppercase;letter-spacing:.4px;}
.form-input{width:100%;padding:8px 12px;border:1.5px solid var(--border);border-radius:6px;font-size:13px;color:var(--text);font-family:inherit;transition:border-color .15s;}
.form-input:focus{outline:none;border-color:var(--primary);}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:14px;border-top:1px solid var(--border);}

/* ══ SECTION ══ */
.section-title{font-size:13px;font-weight:700;color:var(--primary);margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.section-title::before{content:'';display:inline-block;width:3px;height:14px;background:var(--accent);border-radius:2px;}
.complete-chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;}
.chip-done{background:#e8f5e9;color:#2e7d32;} .chip-pending{background:#fff3e0;color:#e65100;}
.divider{height:1px;background:var(--border);margin:20px 0;}

/* ══ ACCOUNT TABLE ══ */
.role-admin{background:#fef9e7;color:#b7791f;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;}
.role-eval{background:#e8f4fd;color:#1565c0;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;}
.role-person{background:#e8f5e9;color:#2e7d32;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;}

/* ══ TOAST ══ */
.toast{position:fixed;bottom:24px;right:24px;background:var(--primary);color:#fff;padding:12px 18px;border-radius:8px;font-size:13px;z-index:999;transform:translateY(100px);opacity:0;transition:all .3s;}
.toast.show{transform:translateY(0);opacity:1;}

/* ══ UPLOAD ══ */
.upload-zone{border:2px dashed var(--border);border-radius:10px;padding:28px;text-align:center;cursor:pointer;transition:all .2s;background:var(--bg);margin-bottom:16px;}
.upload-zone:hover,.upload-zone.drag{border-color:var(--primary-light);background:#eef4fb;}
.upload-zone .upload-icon{font-size:32px;margin-bottom:8px;}
.upload-zone .upload-text{font-size:13px;color:var(--text-muted);}
.upload-zone .upload-text strong{color:var(--primary);}
.upload-result{padding:12px 16px;border-radius:8px;font-size:12px;margin-bottom:12px;display:none;}
.upload-ok{background:#e8f5e9;color:#2e7d32;border-left:3px solid #2e7d32;}
.upload-warn{background:#fff8e1;color:#b7791f;border-left:3px solid #e8b84b;}
@media(max-width:900px){.stats-grid{grid-template-columns:repeat(2,1fr);}}

/* ══ EVAL ANALYSIS REDESIGN ══ */
#page-eval-analysis {
  font-family: 'Malgun Gothic', sans-serif;
  background: #F7F8FA;
  padding: 0;
}
.ea-header {
  background: #fff;
  border-bottom: 1px solid #E8EBF0;
  padding: 20px 28px 16px;
  margin-bottom: 20px;
  border-radius: 12px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.ea-header-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
}
.ea-title-block .ea-eyebrow {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: #8A94A6;
  margin-bottom: 4px;
}
.ea-title-block .ea-main-title {
  font-size: 20px;
  font-weight: 800;
  color: #111827;
  letter-spacing: -0.3px;
}
.ea-filter-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid #F0F2F5;
}
.ea-filter-label {
  font-size: 11px;
  font-weight: 600;
  color: #8A94A6;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-right: 4px;
}
.ea-select {
  padding: 6px 12px;
  border: 1.5px solid #E4E7EC;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 600;
  color: #374151;
  background: #fff;
  cursor: pointer;
  font-family: inherit;
  transition: border-color .15s;
}
.ea-select:focus { outline: none; border-color: #1a3a5c; }
.ea-dummy-badge {
  font-size: 10px;
  padding: 4px 10px;
  border-radius: 6px;
  background: #FEF9E7;
  color: #B7791F;
  border: 1px solid #F6E05E;
  font-weight: 600;
}
/* KPI 카드 */
.ea-kpi-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  margin-bottom: 20px;
}
.ea-kpi-card {
  background: #fff;
  border-radius: 12px;
  padding: 20px 22px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  border: 1px solid #F0F2F5;
  position: relative;
  overflow: hidden;
  transition: box-shadow .2s;
}
.ea-kpi-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
.ea-kpi-accent {
  position: absolute;
  top: 0; left: 0;
  width: 4px;
  height: 100%;
  border-radius: 12px 0 0 12px;
}
.ea-kpi-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: #8A94A6;
  margin-bottom: 8px;
}
.ea-kpi-value {
  font-size: 32px;
  font-weight: 800;
  color: #111827;
  letter-spacing: -1px;
  line-height: 1;
  margin-bottom: 6px;
}
.ea-kpi-sub {
  font-size: 11px;
  color: #8A94A6;
}
.ea-kpi-sub.up { color: #059669; }
.ea-kpi-sub.down { color: #DC2626; }
/* 차트 카드 */
.ea-chart-card {
  background: #fff;
  border-radius: 12px;
  padding: 22px 24px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  border: 1px solid #F0F2F5;
  margin-bottom: 16px;
  transition: box-shadow .2s;
}
.ea-chart-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
.ea-card-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 18px;
  flex-wrap: wrap;
  gap: 8px;
}
.ea-card-title {
  font-size: 13px;
  font-weight: 800;
  color: #111827;
  letter-spacing: -0.2px;
}
.ea-card-sub {
  font-size: 11px;
  color: #8A94A6;
  margin-top: 2px;
}
.ea-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
.ea-section-divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 24px 0 16px;
}
.ea-section-divider-line {
  flex: 1;
  height: 1px;
  background: #E8EBF0;
}
.ea-section-divider-label {
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: #8A94A6;
  white-space: nowrap;
}
.ea-legend-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  display: inline-block;
  flex-shrink: 0;
}
.ea-tag-green { background: #ECFDF5; color: #059669; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.ea-tag-red   { background: #FEF2F2; color: #DC2626; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.ea-tag-gray  { background: #F3F4F6; color: #6B7280; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
</style>

<body>

<!-- ══════════════ LOGIN ══════════════ -->
<div id="login-screen">
  <!-- 상단 로고 -->

// ══ STORAGE (Firebase + 로컬 캐시) ══
async function load() {
  showLoadingOverlay(true);
  try {
    // 계정
    const accDoc = await db.collection('system').doc('accounts').get();
    accounts = accDoc.exists ? accDoc.data().list : DEFAULT_ACCOUNTS;

    // 직책자
    const perDoc = await db.collection('system').doc('persons').get();
    persons = perDoc.exists ? perDoc.data().list : DEFAULT_PERSONS;

    // 활성 분기 설정
    const cfgDoc = await db.collection('system').doc('config').get();
    if (cfgDoc.exists && cfgDoc.data().activeQuarter) {
      activeQuarter = cfgDoc.data().activeQuarter;
    }

    // 평가 데이터 (활성 분기)
    const evalDoc = await db.collection('evalData').doc(getActiveKey()).get();
    evalData = evalDoc.exists ? evalDoc.data().data : {};

    // 인적사항
    const hrDoc = await db.collection('hr').doc('persons').get();
    hrPersons = hrDoc.exists ? hrDoc.data().list : [];

    // PDF URL 맵 (Firestore에서 로드)
    const hrPdfsSnap = await db.collection('hrPdfs').get();
    hrPdfs = {};
    hrPdfsSnap.forEach(doc => { hrPdfs[doc.id] = doc.data(); });

    // 교육/근태/발령 등 추가 데이터 (Firestore에서 로드)
    const hrExtraSnap = await db.collection('hrExtra').get();
    hrExtra = {};
    hrExtraSnap.forEach(doc => { hrExtra[doc.id] = doc.data(); });

    // 로컬 캐시 업데이트
    localStorage.setItem('acc26',      JSON.stringify(accounts));
    localStorage.setItem('per26',      JSON.stringify(persons));
    localStorage.setItem('hr_persons', JSON.stringify(hrPersons));
    localStorage.setItem('hr_pdfs',    JSON.stringify(hrPdfs));
    localStorage.setItem('hr_extra',   JSON.stringify(hrExtra));
    localStorage.setItem(getActiveKey(), JSON.stringify(evalData));

  } catch(err) {
    console.warn('Firebase 로드 실패, 로컬 캐시 사용:', err);
    // 오프라인 폴백
    accounts  = JSON.parse(localStorage.getItem('acc26')    || 'null') || DEFAULT_ACCOUNTS;
    persons   = JSON.parse(localStorage.getItem('per26')    || 'null') || DEFAULT_PERSONS;
    evalData  = JSON.parse(localStorage.getItem(getActiveKey()) || localStorage.getItem('eval26q1') || '{}');
    hrPersons = JSON.parse(localStorage.getItem('hr_persons') || '[]');
    hrPdfs    = JSON.parse(localStorage.getItem('hr_pdfs')    || '{}');
    hrExtra   = JSON.parse(localStorage.getItem('hr_extra')   || '{}');
    persons.forEach(p => {
      if (!evalData[p.no]) evalData[p.no] = {g1:'',g2:'',g3:'',g4:'',g5:'',comment:'',cGrade:'',done:false};
    });
  }
  showLoadingOverlay(false);
}

async function save() {
  // 로컬 캐시 즉시 저장
  localStorage.setItem('acc26',      JSON.stringify(accounts));
  localStorage.setItem('per26',      JSON.stringify(persons));
  localStorage.setItem(getActiveKey(), JSON.stringify(evalData));
  localStorage.setItem('hr_persons', JSON.stringify(hrPersons));
  localStorage.setItem('hr_pdfs',    JSON.stringify(hrPdfs));
  localStorage.setItem('hr_extra',   JSON.stringify(hrExtra));

  // Firebase 저장 (비동기, 백그라운드)
  try {
    const batch = db.batch();
    batch.set(db.collection('system').doc('accounts'), {list: accounts});
    batch.set(db.collection('system').doc('persons'),  {list: persons});
    batch.set(db.collection('evalData').doc(getActiveKey()), {data: evalData, updatedAt: firebase.firestore.FieldValue.serverTimestamp()});
    batch.set(db.collection('hr').doc('persons'), {list: hrPersons});
    await batch.commit();
  } catch(err) {
    console.warn('Firebase 저장 실패 (로컬 저장됨):', err);
    showToast('⚠️ 온라인 저장 실패. 로컬에만 저장됨.');
  }
}

// 평가 데이터만 빠르게 저장
async function saveEvalOnly() {
  localStorage.setItem(getActiveKey(), JSON.stringify(evalData));
  try {
    await db.collection('evalData').doc(getActiveKey()).set(
      {data: evalData, updatedAt: firebase.firestore.FieldValue.serverTimestamp()}
    );
  } catch(err) {
    console.warn('Firebase 평가 저장 실패:', err);
  }
}

// 분기별 평가 데이터 로드 (조회용)
async function loadQuarterData(year, quarter) {
  const key = getQuarterKey(year, quarter);
  try {
    const doc = await db.collection('evalData').doc(key).get();
    return doc.exists ? doc.data().data : {};
  } catch(err) {
    return JSON.parse(localStorage.getItem(key) || '{}');
  }
}

function showLoadingOverlay(show) {
  let overlay = document.getElementById('loading-overlay');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'loading-overlay';
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(26,58,92,0.7);z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;';

    document.head.insertAdjacentHTML('beforeend','<style>@keyframes spin{to{transform:rotate(360deg)}}</style>');

}

// ══════════════════════
//  CALC HELPERS
// ══════════════════════
function calcScore(d) {
  const vals = [d.g1,d.g2,d.g3,d.g4,d.g5].map(g => GRADE_SCORES[g]||0);
  if (vals.every(v=>v>0)) return Math.round(vals.reduce((a,b)=>a+b,0)/5);
  return null;
}
function calcGrade(score) {
  if (score===null) return '';
  if (score===100) return 'S';
  if (score>=90) return 'A';
  if (score>=80) return 'B';
  if (score>=70) return 'C';
  if (score>=60) return 'D';
  return 'E';
}
function isIncentive(grade, nyeoncha) {
  if (!grade || !nyeoncha) return null; // 직책년차 없으면 null (표시 안함)
  const yr = parseInt(nyeoncha) || 0;
  if (yr <= 0) return null;
  if (yr <= 2) return (grade==='S' || grade==='A' || grade==='B'); // 1~2년차: B이상
  return (grade==='S' || grade==='A'); // 3년차↑: A이상
}
function incentiveLabel(grade, nyeoncha) {
  const result = isIncentive(grade, nyeoncha);
  if (result===null) return '-';
  return result ? `${grade}(지급)` : `${grade}(미지급)`;
}
function gradeClass(g) {
  if (!g) return ''; return 'grade-'+g;
}
function gradeOpt(sel) {
  return GRADES.map(g=>`<option value="${g}"${sel===g?' selected':''}>${g}</option>`).join('');
}
function getEvaluatorName(id) {
  const a = accounts.find(x=>x.id===id);
  return a ? a.name : '-';
}
function getMyPersons() {
  // active:false 인원 제외
  return persons.filter(p => p.evaluatorId === currentUser.id && p.active !== false);
}

function updateAdminStats() {
  const _ed = getDisplayEvalData();
  let done=0, incentive=0, totalScore=0;
  persons.filter(p=>p.active!==false).forEach(p=>{
    const d=_ed[p.no]||{}; const score=calcScore(d); const grade=calcGrade(score);
    if(d.done&&score!==null){done++;totalScore+=score;if(isIncentive(grade,p.nyeoncha))incentive++;}
  });
  const avg=done>0?Math.round(totalScore/done):null;
  const t=document.getElementById('stat-total'); if(t)t.textContent=persons.filter(p=>p.active!==false).length;
  const dd=document.getElementById('stat-done'); if(dd)dd.textContent=done;
  const si=document.getElementById('stat-incentive'); if(si)si.textContent=incentive;
  const sa=document.getElementById('stat-avg'); if(sa)sa.textContent=avg!==null?avg+'점':'-';
  const pr=document.getElementById('prog'); if(pr)pr.style.width=(persons.length>0?done/persons.length*100:0)+'%';
  const db=document.getElementById('done-badge');
  const pb=document.getElementById('pending-badge');
  if(db){db.textContent='완료: '+done+'명';db.style.display='inline-flex';}
  if(pb){pb.textContent='미완료: '+(persons.length-done)+'명';pb.style.display='inline-flex';}
}

  const badge = document.getElementById('my-quarter-badge');
  if (badge) badge.textContent = `${viewYear}년 ${viewQ}분기`;

  // 팀 구성
  const siljang  = myP.filter(p=>(p.jikchek||'').includes('실장')).length;
  const teamjang = myP.filter(p=>(p.jikchek||'').includes('팀장')).length;
  const dept     = currentUser.dept || currentUser.jijum || '';
  const setEl = (id,v) => { const e=document.getElementById(id); if(e) e.textContent=v; };
  setEl('my-stat-total',    myP.length+'명');
  setEl('my-stat-dept',     dept);
  setEl('my-stat-siljang',  siljang+'명');
  setEl('my-stat-teamjang', teamjang+'명');

  // 렌더 함수
  const doRender = (ed) => {
    let done=0, incentive=0, totalScore=0;
    myP.forEach(p => {
      const d=ed[p.no]||{};
      const score=calcScore(d); const grade=calcGrade(score);
      if (d.done && score!==null) {
        done++; totalScore+=score;
        if (isIncentive(grade, p.nyeoncha)) incentive++;
      }
    });
    const avg = done>0 ? Math.round(totalScore/done) : null;
    setEl('my-stat-done',      done);
    setEl('my-stat-incentive', incentive);
    setEl('my-stat-avg',       avg!==null ? avg+'점' : '-');
    const pr = document.getElementById('my-prog');
    if (pr) pr.style.width = (myP.length>0 ? done/myP.length*100 : 0)+'%';

    const tb = document.getElementById('my-overview-tbody');
    if (!tb) return;
    tb.innerHTML='';
    myP.forEach((p,i) => {
      const d = ed[p.no]||{};
      const sabunEnc = encodeURIComponent(p.sabun||'');
      const nameEnc  = encodeURIComponent(p.name||'');
      tb.innerHTML += `<tr>
        <td>${i+1}</td>
        <td><strong>${p.name}</strong></td>
        <td style="font-size:11px">${p.bonbu}</td>
        <td>${p.sil}</td><td>${p.team}</td>
        <td>${p.jikgup}</td><td>${p.jikchek}</td>
        <td style="font-size:11px">${p.nyeoncha}</td>
        <td style="text-align:center">
          ${d.done
            ? `<span class="complete-chip chip-done" style="font-size:11px;font-weight:600">✅ 완료</span>`
            : `<a href="#" onclick="showPage('eval');return false;"
                style="display:inline-block;padding:3px 10px;background:#ffebee;color:#c62828;
                border:1.5px solid #ef9a9a;border-radius:20px;font-size:11px;font-weight:700;
                text-decoration:none">평가하기</a>`}
        </td>
        <td style="text-align:center">
          ${currentUser.hrView
            ? `<button onclick="showHrDetail('${sabunEnc}','${nameEnc}')"
                style="padding:3px 10px;background:#e3f2fd;color:#1565c0;border:1.5px solid #90caf9;
                border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit">
                👤 인적사항</button>`
            : `<span style="font-size:11px;color:var(--text-muted)">-</span>`}
        </td>
      </tr>`;
    });
  };

  // 과거 분기면 Firebase에서 로드, 현재 분기면 evalData 그대로
  if (selVal) {
    loadQuarterData(viewYear, viewQ).then(ed => doRender(ed));
  } else {
    doRender(evalData);
  }
}

function updateGrade(no, field, val) {
  if(!evalData[no])evalData[no]={g1:'',g2:'',g3:'',g4:'',g5:'',comment:'',cGrade:'',done:false};
  evalData[no][field]=val;
  const d=evalData[no]; const score=calcScore(d); const grade=calcGrade(score);
  const p=persons.find(p=>p.no===no);
  const eg=document.getElementById('eg-'+no); const es=document.getElementById('es-'+no);
  if(eg)eg.innerHTML=`<span class="${gradeClass(grade)}">${grade ? incentiveLabel(grade, p?.nyeoncha||'') : '-'}</span>`;
  if(es)es.innerHTML=`<span class="score-display">${score!==null?score+' 점':'-'}</span>`;
  if([d.g1,d.g2,d.g3,d.g4,d.g5].every(g=>g!==''))evalData[no].done=true;
}

function updateComment(no, field, val) {
  if(!evalData[no])evalData[no]={g1:'',g2:'',g3:'',g4:'',g5:'',comment:'',cGrade:'',done:false};
  evalData[no][field]=val;
  if(field==='cGrade'){
    const cs={S:100,A:90,B:80,C:70,D:60,E:50};
    const el=document.getElementById('cs-'+no);
    if(el)el.innerHTML=`<span class="score-display">${val?(cs[val]||'-'):'-'}</span>`;
  }
}

// ══ EXCEL UPLOAD ══
function handleDrop(e){
  e.preventDefault();
  document.getElementById('upload-zone').classList.remove('drag');
  const file=e.dataTransfer.files[0];
  if(file) parseExcel(file);
}
function handleExcelUpload(e){
  const file=e.target.files[0];
  if(file) parseExcel(file);
  e.target.value='';
}
function parseExcel(file){
  // 컬럼 순서: 순번(0) 회사명(1) 본부(2) 지점(3) 실/센터(4) 팀(5) 직책(6) 직책급(7) 직급(8) 사원명(9) 사번(10) 회사메일(11) 직책년차(12) 비고(13) 평가자(14)
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const wb=XLSX.read(e.target.result,{type:'binary'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      if(rows.length<2){showUploadResult('warn','데이터가 없습니다. 파일을 확인해주세요.');return;}

      const parsed=[];
      const warnings=[];
      let nextNo=1;
      let newPersonAccounts=0;

      for(let i=1;i<rows.length;i++){
        const r=rows[i];
        const rawName=String(r[9]||'').trim();
        if(!rawName)continue;

        // 평가자 이름으로 계정 ID 매핑
        const evalName=String(r[14]||'').trim();
        const evalAcc=accounts.find(a=>a.name===evalName&&a.role==='eval');
        if(evalName&&!evalAcc){
          warnings.push(`${rawName}: 평가자 '${evalName}' 을 계정에서 찾을 수 없어 미지정 처리됨`);
        }

        const sabun=String(r[10]||'').trim();

        // 사번이 있으면 직책자 계정 자동 생성/업데이트
        if(sabun){
          const existing=accounts.find(a=>a.id===sabun);
          if(!existing){
            accounts.push({id:sabun, pw:'1111111', name:rawName, role:'person', dept:String(r[6]||'').trim()});
            newPersonAccounts++;
          } else if(existing.role==='person'){
            // 이름 업데이트
            existing.name=rawName;
          }
        }

        parsed.push({
          no:nextNo++,
          name:rawName,
          sabun,
          company:String(r[1]||'').trim(),
          bonbu:String(r[2]||'').trim(),
          jijum:String(r[3]||'').trim(),
          sil:String(r[4]||'').trim(),
          team:String(r[5]||'').trim(),
          jikchek:String(r[6]||'').trim(),
          jikchekgup:String(r[7]||'').trim(),
          jikgup:String(r[8]||'').trim(),
          email:String(r[11]||'').trim(),
          nyeoncha:String(r[12]||'').trim(),
          bigo:String(r[13]||'').trim(),
          evaluatorId:evalAcc?evalAcc.id:'',
        });
      }

      if(parsed.length===0){showUploadResult('warn','유효한 데이터가 없습니다. 헤더 행 포함 2행 이상이어야 합니다.');return;}

      // 전체 교체 — 기존 평가 데이터는 이름 기준으로 보존
      const oldPersons=[...persons];
      persons=parsed;
      const newEvalData={};
      parsed.forEach(p=>{
        const old=oldPersons.find(o=>o.name===p.name);
        newEvalData[p.no]=old&&evalData[old.no]?evalData[old.no]:{g1:'',g2:'',g3:'',g4:'',g5:'',comment:'',cGrade:'',done:false};
      });
      evalData=newEvalData;
      save();
      renderPersonsAdmin();

      let msg=`✅ ${parsed.length}명 업로드 완료`;
      if(newPersonAccounts>0) msg+=` · 직책자 계정 ${newPersonAccounts}개 자동 생성 (초기 비밀번호: 1111111)`;
      if(warnings.length) msg+=`<br><span style="color:#b7791f">⚠️ ${warnings.join('<br>')}</span>`;
      showUploadResult(warnings.length?'warn':'ok',msg);
    }catch(err){
      showUploadResult('warn','파일을 읽는 중 오류가 발생했습니다: '+err.message);
    }
  };
  reader.readAsBinaryString(file);
}

function downloadAccountTemplate() {

function handleAccDrop(e) {
  e.preventDefault(); e.currentTarget.classList.remove('drag');
  const f = e.dataTransfer.files[0]; if(f) parseAccExcel(f);
}
function handleAccUpload(e) {

function parseAccExcel(file) {
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const wb = XLSX.read(ev.target.result, {type:'binary'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
      if (rows.length < 2) { showAccResult('warn','데이터가 없습니다.'); return; }

      // 컬럼: 사번(0) 이름(1) 권한(2) 소속(3) 직책(4) 비밀번호(5) 인적사항조회Y/N(6)
      //        회사명(7) 본부(8) 지점(9) 실/센터(10) 팀(11) 직책급(12) 직급(13) 회사메일(14) 직책년차(15) 비고(16)
      const VALID_ROLES = ['admin','eval','person'];
      let accAdded=0, accUpdated=0, personAdded=0, personUpdated=0, skipped=[];
      const allRows = [];

      // 1단계: 전체 파싱 + 계정 처리
      for (let i=1; i<rows.length; i++) {
        const r = rows[i];
        const id       = String(r[0]||'').trim();
        const name     = String(r[1]||'').trim();
        const role     = String(r[2]||'').trim().toLowerCase();
        const dept     = String(r[3]||'').trim(); // 소속
        const position = String(r[4]||'').trim(); // 직책(계정)
        const pw       = String(r[5]||'').trim() || '1111111';
        const hrView   = String(r[6]||'').trim().toUpperCase() === 'Y';
        const company  = String(r[7]||'').trim();
        const bonbu    = String(r[8]||'').trim();
        const jijum    = String(r[9]||'').trim(); // 지점 ← 매칭 키
        const sil      = String(r[10]||'').trim();
        const team     = String(r[11]||'').trim();
        const jikchekgup = String(r[12]||'').trim();
        const jikgup   = String(r[13]||'').trim();
        const email    = String(r[14]||'').trim();
        const nyeoncha = String(r[15]||'').trim();
        const bigo     = String(r[16]||'').trim();

        if (!id || !name) continue;
        if (!VALID_ROLES.includes(role)) {
          skipped.push(`${name}(${id}): 권한값 오류 "${role}"`);
          continue;
        }
        if (id==='admin' && role!=='admin') {
          skipped.push(`${id}: 기본 관리자 계정 권한 변경 불가`);
          continue;
        }

        // 계정 처리
        const existing = accounts.find(a=>a.id===id);
        if (existing) {
          existing.name=name; existing.role=role;
          existing.dept=dept; existing.position=position;
          existing.jijum=jijum; existing.hrView=hrView;
          if (String(r[5]||'').trim()) existing.pw=pw;
          accUpdated++;
        } else {
          accounts.push({id, pw, name, role, dept, position, jijum, hrView});
          accAdded++;
        }

        allRows.push({id, name, role, company, bonbu, jijum, sil, team,
          jikchek:position, jikchekgup, jikgup, email, nyeoncha, bigo, sabun:id});
      }

      // 2단계: person 행만 → 직책자 목록 자동 등록
      // 소속(dept) 기준으로 eval 계정 맵 생성 (jijum 폴백)
      const evalMap = {};
      accounts.filter(a=>a.role==='eval').forEach(a=>{
        const key1 = (a.dept||'').trim();   // 소속 우선
        const key2 = (a.jijum||'').trim();  // 지점 폴백
        if (key1) evalMap[key1] = a.id;
        if (key2 && !evalMap[key2]) evalMap[key2] = a.id;
      });

      const personRows = allRows.filter(r=>r.role==='person');
      if (personRows.length > 0) {
        const uploadedSabuns = new Set(personRows.map(r=>r.sabun).filter(Boolean));
        let nextNo = persons.length>0 ? Math.max(...persons.map(p=>p.no))+1 : 1;
        let deactivated = 0;

        // 엑셀에 없는 기존 인원 → 비활성화
        persons.forEach(p => {
          if (p.sabun && !uploadedSabuns.has(p.sabun)) {
            if (p.active !== false) { p.active = false; deactivated++; }
          }
        });

        personRows.forEach(r=>{
          const evalId = evalMap[r.dept] || evalMap[r.jijum] || '';
          const existing = persons.find(p=>p.sabun===r.sabun && r.sabun);
          if (existing) {
            Object.assign(existing, {
              name:r.name, company:r.company, bonbu:r.bonbu, jijum:r.jijum,
              sil:r.sil, team:r.team, jikchek:r.jikchek, jikchekgup:r.jikchekgup,
              jikgup:r.jikgup, email:r.email, nyeoncha:r.nyeoncha, bigo:r.bigo,
              evaluatorId: evalId || existing.evaluatorId,
              active: true, // 재활성화
            });
            personUpdated++;
          } else {
            persons.push({
              no: nextNo++, name:r.name, sabun:r.sabun,
              company:r.company, bonbu:r.bonbu, jijum:r.jijum,
              sil:r.sil, team:r.team, jikchek:r.jikchek,
              jikchekgup:r.jikchekgup, jikgup:r.jikgup,
              email:r.email, nyeoncha:r.nyeoncha, bigo:r.bigo,
              evaluatorId: evalId,
              active: true,
            });
            if (!evalData[nextNo-1]) evalData[nextNo-1]={g1:'',g2:'',g3:'',g4:'',g5:'',comment:'',cGrade:'',done:false};
            personAdded++;
          }
        });

        if (deactivated > 0)
          msg2 += `<br>⚠️ ${deactivated}명 비활성화 (엑셀 미포함 → 목록에서 숨김, 데이터 유지)`;
      }

      save();
      renderAccountsAdmin();

      let msg = `✅ 계정 — 신규 ${accAdded}개 추가 · ${accUpdated}개 업데이트`;
      let msg2 = '';
      if (personRows.length>0)
        msg += `<br>✅ 직책자 — 신규 ${personAdded}명 추가 · ${personUpdated}명 업데이트` + msg2;

      const unmapped = personRows.filter(r=>!evalMap[r.dept] && !evalMap[r.jijum]);
      if (unmapped.length)
        msg += `<br><span style="color:#b7791f">⚠️ 평가자 미매핑: ${unmapped.map(r=>r.name).join(', ')} (소속 일치하는 eval 계정 없음)</span>`;
      if (skipped.length)
        msg += `<br><span style="color:#b7791f">⚠️ 건너뜀: ${skipped.join(' / ')}</span>`;

      showAccResult((unmapped.length||skipped.length)?'warn':'ok', msg);
    } catch(err) { showAccResult('warn','오류: '+err.message); }
  };
  reader.readAsBinaryString(file);
}
function showAccResult(type, msg) {
  const el = document.getElementById('upload-result-acc');
  if (!el) return;
  el.className = 'upload-result '+(type==='ok'?'upload-ok':'upload-warn');
  el.innerHTML = msg; el.style.display = 'block';
}

function parsePwExcel(file){
  // 형식: 사번(0) | 비밀번호(1)
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const wb=XLSX.read(e.target.result,{type:'binary'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      if(rows.length<2){showPwResult('warn','데이터가 없습니다.');return;}
      let updated=0, notFound=[];
      for(let i=1;i<rows.length;i++){
        const r=rows[i];
        const sabun=String(r[0]||'').trim();
        const pw=String(r[1]||'').trim();
        if(!sabun||!pw)continue;
        const acc=accounts.find(a=>a.id===sabun);
        if(acc){acc.pw=pw;updated++;}
        else notFound.push(sabun);
      }
      save();
      renderAccountsAdmin();
      let msg=`✅ ${updated}개 계정 비밀번호 업데이트 완료`;
      if(notFound.length) msg+=`<br><span style="color:#b7791f">⚠️ 계정 없음: ${notFound.join(', ')}</span>`;
      showPwResult(notFound.length?'warn':'ok', msg);
    }catch(err){showPwResult('warn','오류: '+err.message);}
  };
  reader.readAsBinaryString(file);
}
function showPwResult(type,msg){
  const el=document.getElementById('upload-result-pw');
  if(!el)return;
  el.className='upload-result '+(type==='ok'?'upload-ok':'upload-warn');
  el.innerHTML=msg; el.style.display='block';
}

function hrPersonsDrop(e) {
  e.preventDefault(); e.currentTarget.classList.remove('drag');
  const f = e.dataTransfer.files[0]; if(f) hrPersonsParse(f);
}
function hrPersonsUpload(e) {
  const f = e.target.files[0]; if(f) hrPersonsParse(f); e.target.value='';
}
function hrPersonsParse(file) {
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const wb = XLSX.read(ev.target.result, {type:'binary'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
      if (rows.length < 2) { hrSetResult('r-hr-persons','warn','데이터가 없습니다.'); return; }
      const headers = rows[0].map(h=>String(h).trim());
      const data = [];
      for (let i=1;i<rows.length;i++) {
        const r=rows[i];
        if (r.every(c=>c==='')) continue;
        const obj={};
        headers.forEach((h,j)=>{ obj[h]=String(r[j]||'').trim(); });
        data.push(obj);
      }
      hrPersons = data;
      localStorage.setItem('hr_persons', JSON.stringify(hrPersons));
      const evalFound = EVAL_COL_KEYS.filter(k => headers.includes(k)).length;
      hrSetResult('r-hr-persons','ok',
        `✅ ${data.length}명 업로드 완료 (컬럼 ${headers.length}개${evalFound?` · 평가항목 ${evalFound}개 인식`:''})`);
      const el = document.getElementById('hr-persons-cnt');
      if(el) el.textContent = data.length+'명 등록됨';
      renderHrPdfSlots();
    } catch(err) { hrSetResult('r-hr-persons','warn','오류: '+err.message); }
  };
  reader.readAsBinaryString(file);
}

// 실제 처리
async function pastEvalProcess(file) {
  const year    = document.getElementById('past-eval-year')?.value;
  const quarter = document.getElementById('past-eval-quarter')?.value;
  if (!year || !quarter) { showToast('년도와 분기를 먼저 선택해주세요.'); return; }

  const docKey = `eval_${year}_Q${quarter}`;
  hrSetResult('r-past-eval', 'info', '⏳ 처리 중...');

  const reader = new FileReader();
  reader.onload = async ev => {
    try {
      const wb = XLSX.read(ev.target.result, {type:'binary'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
      if (rows.length < 2) { hrSetResult('r-past-eval','warn','데이터가 없습니다.'); return; }

      const headers = rows[0].map(h=>String(h).trim());
      // 사번/이름 찾기
      const sabunIdx   = headers.findIndex(h=>h==='사번');
      const nameIdx    = headers.findIndex(h=>h==='이름');
      const commentIdx = headers.findIndex(h=>h.startsWith('서술'));
      // g1~g5: 사번/이름 다음 컬럼부터 서술 이전까지 순서대로
      const fixedCols = new Set([sabunIdx, nameIdx, commentIdx].filter(i=>i>=0));
      const gCols = headers.map((_,i)=>i).filter(i=>!fixedCols.has(i)).slice(0,5);

      // 등급→점수, 점수→점수 변환
      function parseScore(v) {
        const s = String(v||'').trim().toUpperCase();
        if (s==='') return '';
        const n = Number(s);
        if (!isNaN(n) && n>0) return n; // 점수 직접 입력
        const gradeMap = {S:100,A:90,B:80,C:70,D:60,E:50};
        return gradeMap[s] !== undefined ? gradeMap[s] : '';
      }

      // 기존 데이터 불러오기 (덮어쓰지 않고 머지)
      let existing = {};
      try {
        const doc = await db.collection('evalData').doc(docKey).get();
        existing = doc.exists ? (doc.data().data || {}) : {};
      } catch(e) {
        existing = JSON.parse(localStorage.getItem(docKey) || '{}');
      }

      let ok = 0, skip = 0;
      for (let i=1; i<rows.length; i++) {
        const r = rows[i];
        if (r.every(c=>c==='')) continue;

        const sabun = sabunIdx>=0 ? String(r[sabunIdx]||'').trim() : '';
        const name  = nameIdx>=0  ? String(r[nameIdx] ||'').trim() : '';

        // persons에서 no 찾기
        const person = persons.find(p =>
          (sabun && p.sabun === sabun) ||
          (name  && p.name  === name)
        );
        if (!person) { skip++; continue; }

        const g1 = parseScore(r[gCols[0]]);
        const g2 = parseScore(r[gCols[1]]);
        const g3 = parseScore(r[gCols[2]]);
        const g4 = parseScore(r[gCols[3]]);
        const g5 = parseScore(r[gCols[4]]);
        const comment = commentIdx>=0 ? String(r[commentIdx]||'').trim() : '';

        existing[person.no] = {
          ...(existing[person.no]||{}),
          g1, g2, g3, g4, g5, comment,
          updatedAt: new Date().toISOString(),
        };
        ok++;
      }

      // Firebase 저장
      try {
        await db.collection('evalData').doc(docKey).set({data: existing}, {merge:true});
      } catch(e) {}
      localStorage.setItem(docKey, JSON.stringify(existing));

      // 레이더 차트 캐시 초기화
      Object.keys(radarDataCache).forEach(k => { if (k.includes(docKey)) delete radarDataCache[k]; });

      hrSetResult('r-past-eval', 'ok',
        `✅ ${docKey} 업로드 완료 · ${ok}명 반영 · ${skip}명 미매칭(사번/이름 불일치)`);
    } catch(err) {
      hrSetResult('r-past-eval', 'warn', '오류: ' + err.message);
    }
  };
  reader.readAsBinaryString(file);
}


function hrPhotoUploadFromTable(e, encKey) {
  const key = decodeURIComponent(encKey);
  const file = e.target.files[0];
  if (!file) return;
  const tdEl = document.getElementById(`photo-td-${encKey}`);
  if (tdEl) tdEl.innerHTML = `<div style="font-size:11px;color:var(--text-muted)">⏳ 업로드 중...</div>`;

  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = async () => {
      const MAX_W=300, MAX_H=400;
      let w=img.width, h=img.height;
      if (w/h > MAX_W/MAX_H) { w=MAX_W; h=Math.round(img.height*MAX_W/img.width); }
      else { h=MAX_H; w=Math.round(img.width*MAX_H/img.height); }
      const canvas = document.createElement('canvas');
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      const blob = await new Promise(res=>canvas.toBlob(res,'image/jpeg',0.85));
      const path = `photos/${key}/photo.jpg`;
      const ref = storage.ref(path);
      try {
        await ref.put(blob);
        const url = await ref.getDownloadURL();
        if (!hrExtra[key]) hrExtra[key] = {};
        hrExtra[key].photo = url;
        await db.collection('hrExtra').doc(key).set({photo: url}, {merge:true});
        if (tdEl) tdEl.innerHTML = `
          <div style="display:inline-flex;flex-direction:column;align-items:center;gap:3px">
            <img src="${url}" style="width:32px;height:40px;object-fit:cover;border-radius:3px;border:1px solid var(--border)">
            <label style="cursor:pointer">
              <input type="file" accept="image/*" style="display:none"
                onchange="hrPhotoUploadFromTable(event,'${encKey}')">
              <span style="font-size:10px;color:var(--primary)">변경</span>
            </label>
            <button onclick="hrPhotoDeleteFromTable('${encKey}')"
              style="font-size:10px;background:none;border:none;color:var(--danger);cursor:pointer">삭제</button>
          </div>`;
        showToast(`✅ ${decodeURIComponent(encKey)} 사진 업로드 완료`);
      } catch(err) {
        if (tdEl) tdEl.innerHTML = `<span style="font-size:10px;color:var(--danger)">❌ 실패</span>`;
        showToast('사진 업로드 실패: ' + err.message);
      }
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
  e.target.value='';
}

async function hrPhotoDeleteFromTable(encKey) {
  const key = decodeURIComponent(encKey);
  if (!confirm(`${key} 사진을 삭제할까요?`)) return;
  try {
    await storage.ref(`photos/${key}/photo.jpg`).delete();
  } catch(e) {}
  if (hrExtra[key]) delete hrExtra[key].photo;
  await db.collection('hrExtra').doc(key).set({photo: ''}, {merge:true});
  const tdEl = document.getElementById(`photo-td-${encKey}`);
  if (tdEl) tdEl.innerHTML = `
    <label style="cursor:pointer;display:inline-flex;flex-direction:column;align-items:center;gap:3px">
      <input type="file" accept="image/*" style="display:none"
        onchange="hrPhotoUploadFromTable(event,'${encKey}')">
      <span style="font-size:18px">🖼️</span>
      <span style="font-size:10px;color:var(--text-muted)">업로드</span>
    </label>`;
  showToast('사진이 삭제되었습니다.');
}

// ── PDF 업로드 ──
function hrPdfUpload(e, encKey, pdfType, tdEl) {
  const key  = decodeURIComponent(encKey);
  const file = e.target.files[0];
  if (!file) return;

  // 업로드 중 표시
  tdEl.innerHTML = `<div style="text-align:center;font-size:11px;color:var(--text-muted)">⏳ 업로드 중...</div>`;

  const path = `pdfs/${key}/${pdfType}.pdf`;
  const ref  = storage.ref(path);

  ref.put(file).then(async () => {
    const url = await ref.getDownloadURL();
    if (!hrPdfs[key]) hrPdfs[key] = {};
    hrPdfs[key][pdfType] = url;
    // Firestore에도 URL 저장
    await db.collection('hrPdfs').doc(key).set(hrPdfs[key], {merge:true});
    localStorage.setItem('hr_pdfs', JSON.stringify(hrPdfs));
    tdEl.innerHTML = `
      <label style="cursor:pointer;display:inline-flex;flex-direction:column;align-items:center;gap:3px">
        <input type="file" accept=".pdf" style="display:none"
          onchange="hrPdfUpload(event,'${encodeURIComponent(key)}','${pdfType}',this.closest('td'))">
        <span style="font-size:18px">✅</span>
        <span style="font-size:10px;color:var(--success)">등록됨</span>
      </label>
      <br><button onclick="hrPdfDelete('${encodeURIComponent(key)}','${pdfType}',this.closest('td'))"
        style="font-size:10px;background:none;border:none;color:var(--danger);cursor:pointer;margin-top:2px">삭제</button>`;
    showToast(`✅ ${PDF_TYPES.find(t=>t.key===pdfType)?.label} PDF 업로드 완료`);
  }).catch(err => {
    tdEl.innerHTML = `<span style="font-size:10px;color:var(--danger)">❌ 실패</span>`;
    showToast('업로드 실패: ' + err.message);
  });
  e.target.value='';
}

// ── PDF 삭제 ──
async function hrPdfDelete(encKey, pdfType, tdEl) {
  if (!confirm('이 PDF를 삭제하시겠습니까?')) return;
  const key  = decodeURIComponent(encKey);
  try {
    await storage.ref(`pdfs/${key}/${pdfType}.pdf`).delete();
  } catch(e) { console.warn('Storage 삭제 실패:', e); }
  if (hrPdfs[key]) { delete hrPdfs[key][pdfType]; }
  await db.collection('hrPdfs').doc(key).set(hrPdfs[key]||{});
  localStorage.setItem('hr_pdfs', JSON.stringify(hrPdfs));
  tdEl.innerHTML = `
    <label style="cursor:pointer;display:inline-flex;flex-direction:column;align-items:center;gap:3px">
      <input type="file" accept=".pdf" style="display:none"
        onchange="hrPdfUpload(event,'${encodeURIComponent(key)}','${pdfType}',this.closest('td'))">
      <span style="font-size:18px">📄</span>
      <span style="font-size:10px;color:var(--text-muted)">업로드</span>
    </label>`;
  showToast('삭제되었습니다.');
}

// 엑셀 날짜 숫자 → 날짜 문자열 변환
function excelDateToStr(val) {
  if (!val || val === '-') return val;
  const num = Number(val);
  if (!isNaN(num) && num > 40000 && num < 60000) {
    const date = new Date(Math.round((num - 25569) * 86400 * 1000));
    const y = date.getUTCFullYear();
    const m = String(date.getUTCMonth()+1).padStart(2,'0');
    const d = String(date.getUTCDate()).padStart(2,'0');
    return `${y}-${m}-${d}`;
  }
  return val;
}

// ── HR 목록 렌더 ──
// 현재 선택된 소속 필터 상태
let hrFilterBonbu = null; // null = 초기화 안됨, '' = 전체

function renderHrList() {
  const wrap = document.getElementById('hr-list-wrap');
  const tabEl = document.getElementById('hr-tab-filter');
  if (!wrap) return;

  function getBonbu(p) { return (p['본부']||p['본부명']||'').trim(); }

  // 전체 데이터 (권한 필터)
  let allData = [...hrPersons];
  if (currentUser.role === 'eval' && !currentUser.hrView) {
    const myNames  = getMyPersons().map(p=>p.name);
    const myBonbus = [...new Set(getMyPersons().map(p=>p.bonbu).filter(Boolean))];
    allData = allData.filter(p => myBonbus.includes(getBonbu(p)) || myNames.includes(hrName(p)));
  }

  // 소속 목록 추출
  const bonbus = [...new Set(allData.map(p=>getBonbu(p)).filter(Boolean))].sort();

  // 초기 진입 시 본인 소속 자동 선택 (본부 기준)
  if (hrFilterBonbu === null) {
    if (currentUser.role === 'eval') {
      // 계정의 dept/jijum 으로 본부 매칭 시도
      const myDept = (currentUser.dept || currentUser.jijum || '').trim();
      // 본부 목록에서 일치하는 것 찾기
      const matched = bonbus.find(b => b === myDept || b.includes(myDept) || myDept.includes(b));
      hrFilterBonbu = matched || (bonbus.length === 1 ? bonbus[0] : '');
    } else {
      hrFilterBonbu = '';
    }
  }

  // 탭 버튼 렌더링
  if (tabEl) {
    const counts = {};
    bonbus.forEach(b => { counts[b] = allData.filter(p=>getBonbu(p)===b).length; });
    const totalCount = allData.length;

    tabEl.innerHTML = `
      <button onclick="setHrFilter('')"
        style="padding:6px 14px;border-radius:20px;border:1.5px solid ${hrFilterBonbu===''?'var(--primary)':'var(--border)'};
        background:${hrFilterBonbu===''?'var(--primary)':'var(--bg)'};
        color:${hrFilterBonbu===''?'#fff':'var(--text-muted)'};
        font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s">
        전체 <span style="opacity:0.8">${totalCount}명</span>
      </button>
      ${bonbus.map(b=>`
        <button onclick="setHrFilter('${b}')"
          style="padding:6px 14px;border-radius:20px;border:1.5px solid ${hrFilterBonbu===b?'var(--primary)':'var(--border)'};
          background:${hrFilterBonbu===b?'var(--primary)':'var(--bg)'};
          color:${hrFilterBonbu===b?'#fff':'var(--text-muted)'};
          font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s">
          ${b} <span style="opacity:0.8">${counts[b]}명</span>
        </button>`).join('')}`;
  }

  // 필터 적용
  let data = hrFilterBonbu ? allData.filter(p=>getBonbu(p)===hrFilterBonbu) : allData;

  if (!data.length) {
    wrap.innerHTML = '<div class="alert alert-info">업로드된 인적사항 데이터가 없거나 조건에 맞는 인원이 없습니다.</div>';
    return;
  }

  const isAdmin = currentUser.role === 'admin';
  const cols = isAdmin ? HR_ADMIN_LIST_COLS : HR_LIST_COLS;

  wrap.innerHTML = `
    <div class="tbl-wrap"><table>
      <thead><tr>
        <th>순번</th>
        ${cols.map(c=>`<th>${c.label}</th>`).join('')}
        <th style="background:#e8b84b;color:#1a3a5c">상세보기</th>
      </tr></thead>
      <tbody>
        ${data.map((row,i)=>`<tr>
          <td style="font-size:12px;text-align:center">${i+1}</td>
          ${cols.map(c=>{
            let v = row[c.key]||'-';
            if (c.key==='현)직책보임일'||c.key==='입사일') v = excelDateToStr(v);
            return `<td style="white-space:nowrap;font-size:12px">${v}</td>`;
          }).join('')}
          <td style="text-align:center">
            <button class="btn btn-primary btn-sm"
              onclick="showHrDetail('${encodeURIComponent(row['사번']||'')}','${encodeURIComponent(row['이름']||row['성명']||row['사원명']||'')}')">
              상세보기</button>
          </td>
        </tr>`).join('')}
      </tbody>
    </table></div>`;
}

function setHrFilter(bonbu) {
  hrFilterBonbu = bonbu;
  renderHrList();
}

function switchHrTab(idx, total) {
  if (!total) total = 1 + PDF_TYPES.length;
  for (let i=0;i<total;i++) {
    const tab  = document.getElementById('hr-tab-'+i);
    const cont = document.getElementById('hr-tab-content-'+i);
    if (!tab||!cont) continue;
    tab.style.color = i===idx ? 'var(--primary)' : 'var(--text-muted)';
    tab.style.borderBottomColor = i===idx ? 'var(--accent)' : 'transparent';
    cont.style.display = i===idx ? 'block' : 'none';
  }
}

// ── 사진 (Firebase Storage + 자동 압축) ──
function uploadPhoto(e, key) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = async () => {
      const MAX_W=300, MAX_H=400;
      let w=img.width, h=img.height;
      if (w>MAX_W||h>MAX_H) { const r=Math.min(MAX_W/w,MAX_H/h); w=Math.round(w*r); h=Math.round(h*r); }
      const canvas=document.createElement('canvas');
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      const compressed=canvas.toDataURL('image/jpeg',0.75);
      const kb=Math.round(compressed.length*0.75/1024);

      // base64 → Blob → Storage 업로드
      const res   = await fetch(compressed);
      const blob  = await res.blob();
      const path  = `photos/${key}/photo.jpg`;
      const ref   = storage.ref(path);

      const photoBox = document.getElementById('photo-box-'+key.replace(/[^a-zA-Z0-9]/g,'_'));
      if (photoBox) photoBox.innerHTML = `<div style="font-size:11px;color:var(--text-muted);text-align:center;padding:10px">⏳ 업로드 중...</div>`;

      ref.put(blob, {contentType:'image/jpeg'}).then(async () => {
        const url = await ref.getDownloadURL();
        if (!hrExtra[key]) hrExtra[key]={photo:'',edu:[],attend:{months:[]},history:[]};
        hrExtra[key].photo = url;
        await db.collection('hrExtra').doc(key).set({photo:url},{merge:true});
        localStorage.setItem('hr_extra', JSON.stringify(hrExtra));
        if (photoBox) photoBox.innerHTML = `<img src="${url}" style="width:100%;height:100%;object-fit:cover">`;
        showToast(`✅ 사진 저장 완료 (${w}×${h}px, 약 ${kb}KB)`);
      }).catch(err => {
        if (photoBox) photoBox.innerHTML = `<span style="font-size:40px">👤</span>`;
        showToast('사진 업로드 실패: '+err.message);
      });
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
  e.target.value='';
}

function eduExcelUpload(e, key) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const wb = XLSX.read(ev.target.result, {type:'binary'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
      if (rows.length < 2) { showToast('데이터가 없습니다.'); return; }
      const headers = rows[0].map(h=>String(h).trim());
      const ex = getExtra(key);
      for (let i=1;i<rows.length;i++) {
        const r=rows[i]; if(r.every(c=>c===''))continue;
        const obj={};headers.forEach((h,j)=>{obj[h]=String(r[j]||'').trim();});
        ex.edu.push({
          name: obj['교육명']||obj[headers[0]]||'',
          org:  obj['교육기관']||obj[headers[1]]||'',
          start:obj['시작일']||obj['교육기간']||obj[headers[2]]||'',
          end:  obj['종료일']||obj[headers[3]]||'',
          hours:obj['교육시간']||obj[headers[4]]||'',
          done: obj['이수여부']||obj[headers[5]]||'이수',
        });
      }
      localStorage.setItem('hr_extra', JSON.stringify(hrExtra));
      showToast(`✅ 교육 ${rows.length-1}건 업로드. 저장 버튼을 눌러주세요.`);
    } catch(err) { showToast('오류: '+err.message); }
  };
  reader.readAsBinaryString(file);
  e.target.value='';
}

function editAttend(key, month, field, val) {
  const ex = getExtra(key);
  if (!ex.attend) ex.attend = {months:[]};
  let mo = ex.attend.months.find(m=>m.month===month);
  if (!mo) { mo={month,late:0,absent:0,leave:0}; ex.attend.months.push(mo); }
  mo[field] = Number(val)||0;
}
function attendExcelUpload(e, key) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const wb = XLSX.read(ev.target.result,{type:'binary'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      if (rows.length<2){showToast('데이터가 없습니다.');return;}
      const ex = getExtra(key);
      if(!ex.attend) ex.attend={months:[]};
      for(let i=1;i<rows.length;i++){
        const r=rows[i]; if(r.every(c=>c===''))continue;
        const month=Number(r[0])||0;
        if(month<1||month>12)continue;
        let mo=ex.attend.months.find(m=>m.month===month);
        if(!mo){mo={month,late:0,absent:0,leave:0};ex.attend.months.push(mo);}
        mo.late=Number(r[1])||0; mo.absent=Number(r[2])||0; mo.leave=Number(r[3])||0;
      }
      localStorage.setItem('hr_extra', JSON.stringify(hrExtra));
      showToast('✅ 근태 업로드 완료. 저장 버튼을 눌러주세요.');
    } catch(err){showToast('오류: '+err.message);}
  };
  reader.readAsBinaryString(file); e.target.value='';
}

function getEvalItems(year, bonbu) {
  const yearData = EVAL_ITEMS[Number(year)];
  if (!yearData) return ['항목1','항목2','항목3','항목4','항목5'];
  if (!bonbu) return yearData.default || ['항목1','항목2','항목3','항목4','항목5'];
  const key = Object.keys(yearData).find(k =>
    k !== 'default' && (bonbu.includes(k) || k.includes(bonbu))
  );
  return (key ? yearData[key] : yearData.default) || ['항목1','항목2','항목3','항목4','항목5'];
}

  listEl.innerHTML = '<div style="padding:12px;text-align:center;color:var(--text-muted);font-size:12px">불러오는 중...</div>';

  // 평가 기준 텍스트
  const criteria = EVAL_CRITERIA[year];
  const criteriaHtml = criteria ? `
    <div style="margin-bottom:12px;padding:10px 14px;background:#eef4fb;border-radius:8px;
      border-left:3px solid var(--primary-light)">
      <div style="font-size:10px;font-weight:700;color:var(--primary-light);margin-bottom:4px;letter-spacing:0.5px">
        📌 ${year}년 평가 기준
      </div>
      <div style="font-size:12px;color:var(--text);line-height:1.7">${criteria}</div>
    </div>` : '';

  const COLORS = ['#3266AD','#2E7D32','#E65100','#6A1B9A'];
  const person = persons.find(p => (sabun && p.sabun===sabun) || p.name===name);
  let html = criteriaHtml;

  for (let i=0; i<4; i++) {
    const q = ['Q1','Q2','Q3','Q4'][i];
    const docKey = `eval_${year}_${q}`;
    const color = COLORS[i];
    const bodyId = `cmt-body-${safeKey}-${year}-${q}`;
    const arrowId = `cmt-arrow-${safeKey}-${year}-${q}`;

    let comment = '';
    if (person) {
      try {
        const doc = await db.collection('evalData').doc(docKey).get();
        const qData = doc.exists ? doc.data().data : {};
        const d = qData[person.no];
        comment = d ? (d.comment||'') : '';
      } catch(e) {
        const qData = JSON.parse(localStorage.getItem(docKey)||'{}');
        const d = person ? qData[person.no] : null;
        comment = d ? (d.comment||'') : '';
      }
    }

    const preview = comment ? (comment.length>50 ? comment.slice(0,50)+'...' : comment) : '서술 평가 없음';
    html += `
    <div style="margin-bottom:8px;border-radius:8px;overflow:hidden;border:1px solid ${color}33">
      <div onclick="toggleComment('${bodyId}','${arrowId}')"
        style="display:flex;align-items:center;justify-content:space-between;
        padding:10px 14px;background:${color}11;cursor:pointer">
        <span style="font-size:12px;font-weight:700;color:${color}">${i+1}분기</span>
        <div style="display:flex;align-items:center;gap:8px;flex:1;margin-left:12px;overflow:hidden">
          <span style="font-size:11px;color:var(--text-muted);flex:1;
            white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${preview}</span>
          <span id="${arrowId}" style="font-size:12px;color:${color};transition:transform .2s;flex-shrink:0">▼</span>
        </div>
      </div>
      <div id="${bodyId}" style="display:none;padding:12px 16px;font-size:12px;
        color:var(--text);line-height:1.8;border-top:1px solid ${color}22;background:var(--surface)">
        ${comment || '<span style="color:var(--text-muted)">해당 분기 서술 평가가 없습니다.</span>'}
      </div>
    </div>`;
  }
  listEl.innerHTML = html;
}

function eaGetAvg(bonbu, jikchek, idx) {
  const base = EA_BONBU_AVG[bonbu][idx];
  return jikchek === 'all' ? base : base + (EA_JIKCHEK_ADJ[jikchek]||0);
}

function renderEvalAnalysis() {
  const year    = document.getElementById('ea-year')?.value || '2026';
  const quarter = document.getElementById('ea-quarter')?.value || 'all';
  const bonbu   = document.getElementById('ea-bonbu')?.value || 'all';
  const jikchek = document.getElementById('ea-jikchek')?.value || 'all';

  const desc = document.getElementById('ea-filter-desc');
  if(desc) desc.textContent =
    `${year==='all'?'전체 기간':year+'년'} · ${quarter==='all'?'전체 분기':quarter+'분기'} · ${bonbu==='all'?'전체 본부':bonbu} · ${jikchek==='all'?'전체 직책':jikchek}`;

  let qs = EA_ALL_Q.filter(q => {
    if(year!=='all' && q.year!==year) return false;
    if(quarter!=='all' && q.q!==quarter) return false;
    return true;
  });
  if(qs.length===0) qs = EA_ALL_Q.filter(q=>q.year==='2026');
  const lastQ = qs[qs.length-1];
  const prevQ = qs.length>1 ? qs[qs.length-2] : null;

  const bonbuList = bonbu==='all' ? EA_BONBU_LIST : [bonbu];
  const avgNow = Math.round(bonbuList.reduce((s,b)=>s+eaGetAvg(b,jikchek,lastQ.idx),0)/bonbuList.length);
  const avgPrev = prevQ ? Math.round(bonbuList.reduce((s,b)=>s+eaGetAvg(b,jikchek,prevQ.idx),0)/bonbuList.length) : null;
  const diff = avgPrev!==null ? avgNow-avgPrev : null;
  const total = bonbu==='all' ? 106 : 21;
  const incPct = 55 + lastQ.idx*2;
  const incCnt = Math.round(total*incPct/100);
  const bestB = bonbu==='all' ? EA_BONBU_LIST.reduce((a,b)=>eaGetAvg(a,jikchek,lastQ.idx)>=eaGetAvg(b,jikchek,lastQ.idx)?a:b) : bonbu;

  const setEl=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};
  setEl('ea-s-total', total+'명');
  setEl('ea-s-avg', avgNow+'점');
  setEl('ea-s-diff', diff!==null ? `전분기 대비 ${diff>=0?'+':''}${diff}점` : '-');
  setEl('ea-s-incentive', incCnt+'명');
  setEl('ea-s-inc-pct', `전체의 ${incPct}%`);
  setEl('ea-s-best', EA_SHORT[bestB]||bestB);
  setEl('ea-s-best-score', '평균 '+eaGetAvg(bestB,jikchek,lastQ.idx)+'점');

  // 추이 차트
  const tLabels = qs.map(q=>q.label);
  let tDatasets = [];
  if(bonbu==='all'){
    tDatasets = EA_BONBU_LIST.map((b,i)=>({
      label:b, data:qs.map(q=>eaGetAvg(b,jikchek,q.idx)),
      borderColor:EA_COLORS[i], backgroundColor:EA_COLORS[i]+'18',
      borderWidth:2, pointRadius:3.5, pointHoverRadius:6, fill:false, tension:0.4
    }));
    setEl('ea-trend-title','분기별 평균 점수 추이 — 전체 본부');
  } else {
    const overall = qs.map(q=>Math.round(EA_BONBU_LIST.reduce((s,b)=>s+eaGetAvg(b,jikchek,q.idx),0)/EA_BONBU_LIST.length));
    tDatasets = [
      {label:'전체 평균', data:overall, borderColor:'#9E9E9E', borderDash:[5,4], borderWidth:1.5, pointRadius:2.5, fill:false, tension:0.4},
      {label:bonbu, data:qs.map(q=>eaGetAvg(bonbu,jikchek,q.idx)), borderColor:EA_COLORS[0], backgroundColor:EA_COLORS[0]+'22', borderWidth:2.5, pointRadius:5, fill:true, tension:0.4},
    ];
    setEl('ea-trend-title','분기별 평균 점수 추이 — '+bonbu);
  }
  const legEl = document.getElementById('ea-trend-legend');
  if(legEl) legEl.innerHTML = tDatasets.map(d=>
    `<span style="display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--text-muted)">
      <span style="width:10px;height:10px;border-radius:2px;background:${d.borderColor};display:inline-block"></span>
      ${EA_SHORT[d.label]||d.label}</span>`
  ).join('');

  const chartDefaults = {
    responsive:true, maintainAspectRatio:false,
    plugins:{ legend:{display:false} },
  };
  const gridStyle = { color:'#F0F2F5', drawBorder:false };
  const tickStyle = { font:{size:11, family:"'Malgun Gothic',sans-serif"}, color:'#8A94A6' };

  if(eaTC) eaTC.destroy();
  eaTC = new Chart(document.getElementById('ea-trendChart'),{
    type:'line', data:{labels:tLabels, datasets:tDatasets},
    options:{...chartDefaults,
      interaction:{mode:'index',intersect:false},
      plugins:{legend:{display:false},
        tooltip:{backgroundColor:'#111827',titleColor:'#fff',bodyColor:'#D1D5DB',padding:10,cornerRadius:8,
          callbacks:{label:c=>`  ${EA_SHORT[c.dataset.label]||c.dataset.label}: ${c.raw}점`}}},
      scales:{
        y:{min:65,max:100,grid:gridStyle,ticks:{...tickStyle,callback:v=>v+'점'},border:{display:false}},
        x:{grid:{display:false},ticks:tickStyle,border:{display:false}}
      }}
  });

  // 도넛
  const EA_GRADE_COLORS2 = {S:'#1D4ED8',A:'#059669',B:'#D97706',C:'#DC2626','D/E':'#9CA3AF'};
  const gd = EA_GRADE_DIST[lastQ.idx] || EA_GRADE_DIST[7];

    `<span style="font-size:10px;padding:3px 9px;border-radius:20px;font-weight:700;background:${EA_GRADE_COLORS2[k]}18;color:${EA_GRADE_COLORS2[k]};border:1px solid ${EA_GRADE_COLORS2[k]}33">${k} · ${gd[k]}명</span>`
  ).join('');
  if(eaDC) eaDC.destroy();
  eaDC = new Chart(document.getElementById('ea-donutChart'),{
    type:'doughnut', data:{labels:gKeys,datasets:[{data:gVals,backgroundColor:gKeys.map(k=>EA_GRADE_COLORS2[k]),borderWidth:3,borderColor:'#fff'}]},
    options:{...chartDefaults,cutout:'65%',
      plugins:{legend:{display:true,position:'right',labels:{font:{size:11},color:'#374151',padding:10,usePointStyle:true,pointStyleWidth:8}},
        tooltip:{backgroundColor:'#111827',titleColor:'#fff',bodyColor:'#D1D5DB',padding:10,cornerRadius:8}}}
  });

  // 본부별 막대
  const bVals = EA_BONBU_LIST.map(b=>eaGetAvg(b,jikchek,lastQ.idx));
  const bColors = EA_BONBU_LIST.map((b,i)=>bonbu==='all'||bonbu===b ? '#1D4ED8' : '#E5E7EB');
  const bHover = EA_BONBU_LIST.map(()=>'#2563EB');
  if(eaBC) eaBC.destroy();
  eaBC = new Chart(document.getElementById('ea-barChart'),{
    type:'bar', data:{labels:EA_BONBU_LIST.map(b=>EA_SHORT[b]),datasets:[{data:bVals,backgroundColor:bColors,hoverBackgroundColor:bHover,borderRadius:6,borderWidth:0}]},
    options:{...chartDefaults,
      plugins:{legend:{display:false},tooltip:{backgroundColor:'#111827',titleColor:'#fff',bodyColor:'#D1D5DB',padding:10,cornerRadius:8,callbacks:{label:c=>`평균 ${c.raw}점`}}},
      scales:{
        y:{min:65,max:100,grid:gridStyle,ticks:{...tickStyle,callback:v=>v+'점'},border:{display:false}},
        x:{grid:{display:false},ticks:tickStyle,border:{display:false}}
      }}
  });

  // 레이더
  const rVals = EA_RADAR[lastQ.idx] || EA_RADAR[7];
  const rLabels = ['동기부여','코칭','소통 및 공감','조직역량','성과창출'];
  setEl('ea-radar-title', `역량 항목별 평균 (${year==='all'?'전체':year+'년'}${quarter!=='all'?' '+quarter+'분기':''})`);
  if(eaRC) eaRC.destroy();
  eaRC = new Chart(document.getElementById('ea-radarChart'),{
    type:'radar', data:{labels:rLabels,datasets:[{label:'평균',data:rVals,backgroundColor:'#1D4ED808',borderColor:'#1D4ED8',borderWidth:2,pointBackgroundColor:'#1D4ED8',pointRadius:4,pointHoverRadius:6}]},
    options:{...chartDefaults,
      scales:{r:{min:65,max:100,grid:{color:'#E5E7EB'},angleLines:{color:'#E5E7EB'},ticks:{font:{size:10},color:'#9CA3AF',stepSize:10,backdropColor:'transparent'},pointLabels:{font:{size:11},color:'#374151'}}}}
  });

  // 직책년차별
  const nyColors=['#059669','#059669','#1D4ED8','#1D4ED8','#D97706','#D97706'];
  if(eaNC) eaNC.destroy();
  eaNC = new Chart(document.getElementById('ea-nyeonChart'),{

  renderCommentCharts();
}

function eaMatchColor(v){ return v>=80?'#2E7D32':v>=65?'#E65100':'#C62828'; }
function eaToneStyle(t){ return t==='긍정'?{bg:'#e8f5e9',c:'#2e7d32'}:t==='중립'?{bg:'#f5f5f5',c:'#616161'}:{bg:'#ffebee',c:'#c62828'}; }

function renderCommentDetail() {
  const name = document.getElementById('ea-person-sel')?.value || '이문성';
  const data = EA_COMMENT_PERSONS[name];
  if (!data) return;

  // 평균 일치도 배지
  const badge = document.getElementById('ea-avg-match-badge');
  if (badge) { badge.textContent = '평균 일치도 '+data.avgMatch+'%'; badge.style.color=eaMatchColor(data.avgMatch); badge.style.background=eaMatchColor(data.avgMatch)+'18'; }

  // 연초 방향
  const dirBox = document.getElementById('ea-dir-box');
  if (dirBox) {
    dirBox.innerHTML = '';
    const label = document.createElement('div');
    label.style.cssText = 'font-size:11px;color:#6A1B9A;font-weight:600;margin-bottom:6px';
    label.textContent = '📌 연초 평가 방향';
    const txt = document.createElement('div');
    txt.style.cssText = 'font-size:12px;color:var(--text);line-height:1.7;margin-bottom:8px';
    txt.textContent = data.dir;
    const tags = document.createElement('div');
    tags.style.cssText = 'display:flex;gap:4px;flex-wrap:wrap';
    data.dirTags.forEach(t => {
      const tag = document.createElement('span');
      tag.style.cssText = 'display:inline-block;font-size:11px;padding:3px 9px;border-radius:20px;background:#f3e8ff;color:#6A1B9A;font-weight:500';
      tag.textContent = t;
      tags.appendChild(tag);
    });
    dirBox.appendChild(label); dirBox.appendChild(txt); dirBox.appendChild(tags);
  }

  // 분기별 그리드
  const grid = document.getElementById('ea-quarter-grid');
  if (!grid) return;
  grid.innerHTML = '';
  data.quarters.forEach(d => {
    const cell = document.createElement('div');
    cell.style.cssText = 'background:var(--bg);border-radius:8px;padding:10px;border:1px solid var(--border);'+(d.alert?'border-color:#E65100;':'');

    const topRow = document.createElement('div');
    topRow.style.cssText = 'display:flex;align-items:center;justify-content:space-between;margin-bottom:6px';
    const qLbl = document.createElement('span');
    qLbl.style.cssText = 'font-size:12px;font-weight:700;color:var(--text)';
    qLbl.textContent = d.q;
    topRow.appendChild(qLbl);
    if (d.alert) { const w=document.createElement('span'); w.style.cssText='font-size:10px;color:#E65100'; w.textContent='⚠️ 방향 이탈'; topRow.appendChild(w); }
    cell.appendChild(topRow);

    const pct = document.createElement('div');
    pct.style.cssText = 'font-size:11px;font-weight:600;color:'+eaMatchColor(d.match)+';margin-bottom:4px';
    pct.textContent = '일치도 '+d.match+'%';
    cell.appendChild(pct);

    const barWrap = document.createElement('div');
    barWrap.style.cssText = 'height:6px;border-radius:3px;background:var(--border);overflow:hidden;margin-bottom:8px';
    const barFill = document.createElement('div');
    barFill.style.cssText = 'height:100%;border-radius:3px;width:'+d.match+'%;background:'+eaMatchColor(d.match);
    barWrap.appendChild(barFill);
    cell.appendChild(barWrap);

    const tagsRow = document.createElement('div');
    tagsRow.style.cssText = 'display:flex;flex-wrap:wrap;gap:3px;margin-bottom:8px';
    const ts = eaToneStyle(d.tone);
    const toneBadge = document.createElement('span');
    toneBadge.style.cssText = 'display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;background:'+ts.bg+';color:'+ts.c+';font-weight:500';
    toneBadge.textContent = d.tone;
    tagsRow.appendChild(toneBadge);
    d.keywords.forEach(k => {
      const kt = document.createElement('span');
      kt.style.cssText = 'display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;background:var(--surface);color:var(--text-muted);border:1px solid var(--border)';
      kt.textContent = k;
      tagsRow.appendChild(kt);
    });
    cell.appendChild(tagsRow);

    const txtEl = document.createElement('div');
    txtEl.style.cssText = 'font-size:11px;color:var(--text-muted);line-height:1.6;font-style:italic';
    txtEl.textContent = d.text;
    cell.appendChild(txtEl);
    grid.appendChild(cell);
  });
}
