function initDashboard() {
  setTimeout(() => { switchDashPeriod('q1'); }, 100);
}

function switchDashPeriod(period) {
  ['q1','q2','all'].forEach(p => {
    const btn = document.getElementById('dash-btn-'+p);
    if (!btn) return;
    btn.className = p===period ? 'btn btn-primary btn-sm' : 'btn btn-outline btn-sm';
  });

  const d = DASH_DATA[period];
  const canvas = document.getElementById('dash-line-chart');
  if (!canvas) return;

  const datasets = [
    { label:'접속자', data:d.access, borderColor:'#3266AD', backgroundColor:'#3266AD18', tension:0.3, pointRadius:3, fill:true }
  ];
  if (d.eval) {
    datasets.push({ label:'평가입력', data:d.eval, borderColor:'#2E7D32', backgroundColor:'#2E7D3218', tension:0.3, pointRadius:3, fill:true });
  }

  if (dashChart) { dashChart.destroy(); dashChart = null; }
  dashChart = new Chart(canvas, {
    type: 'line',
    data: { labels: d.labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: '#88878018' }, ticks: { font: { size: 10 }, color: '#888780' } },
        y: { grid: { color: '#88878018' }, ticks: { font: { size: 10 }, color: '#888780' }, beginAtZero: true }
      }
    }
  });
}


function gradeToScore(g) {
  return {S:6, A:5, B:4, C:3, D:2, E:1}[g]||0;
}
function radarPoly(r, scores) {
  if (!scores) {
    return [0,1,2,3,4].map(i=>{const a=(i*72-90)*Math.PI/180;return `${Math.cos(a)*r},${Math.sin(a)*r}`;}).join(' ');
  }
  return scores.map((s,i)=>{const a=(i*72-90)*Math.PI/180;const r2=(s/7)*140;return `${Math.cos(a)*r2},${Math.sin(a)*r2}`;}).join(' ');
}
const radarActiveQuarters={};
const radarDataCache={};

async function toggleRadarQuarter(safeKey,q,sabun,name){
  if(!radarActiveQuarters[safeKey]) radarActiveQuarters[safeKey]={Q1:false,Q2:false,Q3:false,Q4:false};
  radarActiveQuarters[safeKey][q]=!radarActiveQuarters[safeKey][q];
  const btn=document.getElementById(`radar-btn-${safeKey}-${q}`);
  if(btn){const active=radarActiveQuarters[safeKey][q];btn.style.background=active?btn.dataset.color:'var(--bg)';btn.style.color=active?'#fff':'var(--text-muted)';btn.dataset.active=active;}
  await renderRadar(safeKey,sabun,name);
}
async function toggleAllRadar(safeKey,sabun,name){
  if(!radarActiveQuarters[safeKey]) radarActiveQuarters[safeKey]={Q1:false,Q2:false,Q3:false,Q4:false};
  const anyOn=Object.values(radarActiveQuarters[safeKey]).some(v=>v);
  ['Q1','Q2','Q3','Q4'].forEach(q=>{
    radarActiveQuarters[safeKey][q]=!anyOn;
    const btn=document.getElementById(`radar-btn-${safeKey}-${q}`);
    if(btn){btn.style.background=!anyOn?btn.dataset.color:'var(--bg)';btn.style.color=!anyOn?'#fff':'var(--text-muted)';}
  });
  await renderRadar(safeKey,sabun,name);
}

async function renderRadar(safeKey,sabun,name){
  const COLORS={Q1:'#3266AD',Q2:'#2E7D32',Q3:'#E65100',Q4:'#6A1B9A'};
  const LABELS={Q1:'1분기',Q2:'2분기',Q3:'3분기',Q4:'4분기'};
  const active=radarActiveQuarters[safeKey]||{};
  const year=radarSelectedYear[safeKey]||activeQuarter.year;
  const layers=document.getElementById(`radar-layers-${safeKey}`);
  const legend=document.getElementById(`radar-legend-${safeKey}`);
  const scorePanel=document.getElementById(`radar-score-panel-${safeKey}`);
  if(!layers) return;

  // 년도 미선택 안내
  if(!radarSelectedYear[safeKey]){
    if(scorePanel) scorePanel.innerHTML=`<div style="padding:16px;text-align:center;color:var(--text-muted);font-size:12px">년도를 먼저 선택하세요</div>`;
    return;
  }

  const dataMap={};
  for(const q of ['Q1','Q2','Q3','Q4']){
    if(!active[q]) continue;
    const cKey=`${safeKey}_${q}`;
    if(!radarDataCache[cKey]){
      const docKey=`eval_${year}_${q}`;
      try{const doc=await db.collection('evalData').doc(docKey).get();radarDataCache[cKey]=doc.exists?doc.data().data:{};}
      catch(e){radarDataCache[cKey]=JSON.parse(localStorage.getItem(docKey)||'{}');}
    }
    dataMap[q]=radarDataCache[cKey];
  }

  function findPerson(qData){
    if(!qData) return null;
    const p=persons.find(p=>(sabun&&p.sabun===sabun)||p.name===name);
    return p?(qData[p.no]||null):null;
  }

  layers.innerHTML='';
  const activeLegends=[];
  let lastData=null,lastQ=null;

  // 소속 가져오기 (hrPersons에서)
  const hrP = hrPersons.find(p=>(sabun&&(p['사번']||'').trim()===sabun)||(p['이름']||p['성명']||'').trim()===name);
  const bonbu = hrP ? (hrP['본부']||hrP['지점']||'') : '';
  const ITEMS = getEvalItems(year, bonbu);

  // 레이더 레이블 업데이트
  ITEMS.forEach((label,i)=>{
    const el=document.getElementById(`radar-label-${safeKey}-${i}`);
    if(el) el.textContent=label;
  });

  for(const q of ['Q1','Q2','Q3','Q4']){
    if(!active[q]) continue;
    const d=findPerson(dataMap[q]);
    if(!d) continue;
    // 점수: 숫자면 직접 사용, 등급이면 변환
    function toNum(v){ const n=Number(v); return (!isNaN(n)&&n>0) ? n : gradeToScore(v)*100/6; }
    const scores=[toNum(d.g1),toNum(d.g2),toNum(d.g3),toNum(d.g4),toNum(d.g5)];
    const maxScore=100;
    const color=COLORS[q];
    const pts=scores.map((s,i)=>{const a=(i*72-90)*Math.PI/180;const r2=(s/maxScore)*150;return `${Math.cos(a)*r2},${Math.sin(a)*r2}`;}).join(' ');
    layers.innerHTML+=`<polygon points="${pts}" fill="${color}" fill-opacity="0.15" stroke="${color}" stroke-width="2" stroke-linejoin="round"/>
    ${scores.map((s,i)=>{const a=(i*72-90)*Math.PI/180;const r2=(s/maxScore)*150;return `<circle cx="${Math.cos(a)*r2}" cy="${Math.sin(a)*r2}" r="3.5" fill="${color}" opacity="0.85"/>`;}).join('')}`;
    activeLegends.push({q,color,label:LABELS[q]});
    lastData=d; lastQ=q;
  }

  if(legend) legend.innerHTML=activeLegends.map(({color,label})=>
    `<span style="display:inline-flex;align-items:center;gap:3px"><span style="width:9px;height:9px;border-radius:2px;background:${color};display:inline-block"></span><span style="font-size:11px;color:var(--text-muted)">${label}</span></span>`
  ).join('');

  if(!lastData){
    if(scorePanel) scorePanel.innerHTML=`<div style="padding:16px;text-align:center;color:var(--text-muted);font-size:12px">분기 버튼을 클릭해서 역량을 확인하세요</div>`;
    return;
  }

  const grades=[lastData.g1,lastData.g2,lastData.g3,lastData.g4,lastData.g5];
  function toNum(v){ const n=Number(v); return (!isNaN(n)&&n>0) ? n : gradeToScore(v)*100/6; }
  const scores5=grades.map(toNum);
  const avg=scores5.filter(s=>s>0).reduce((a,b)=>a+b,0)/(scores5.filter(s=>s>0).length||1);
  const maxIdx=scores5.indexOf(Math.max(...scores5));
  const minIdx=scores5.indexOf(Math.min(...scores5.filter(s=>s>0)));
  const color=COLORS[lastQ];

  if(scorePanel) scorePanel.innerHTML=`
    <div style="background:var(--surface);border-radius:8px;padding:10px 12px;border:1px solid var(--border)">
      <div style="font-size:11px;font-weight:700;color:${color};margin-bottom:6px;padding-bottom:5px;border-bottom:1px solid var(--border)">${year}년 ${LABELS[lastQ]} 평가</div>
      ${ITEMS.map((item,i)=>{
        const rawVal = grades[i]||'-';
        const numVal = scores5[i];
        const dispVal = numVal>0 ? Math.round(numVal)+'점' : rawVal;
        const dispColor = numVal>=90?'#c62828':numVal>=80?'#1565c0':numVal>=70?'#2e7d32':'var(--text)';
        return `<div style="display:flex;align-items:center;justify-content:space-between;padding:2px 0;${i<4?'border-bottom:1px solid #f0f2f5':''}">
          <span style="font-size:12px;color:var(--text-muted)">${item}</span>
          <span style="font-size:12px;font-weight:700;color:${dispColor}">${dispVal}</span>
        </div>`;
      }).join('')}
      <div style="display:flex;justify-content:space-between;margin-top:6px;padding-top:5px;border-top:2px solid ${color}33">
        <span style="font-size:11px;color:var(--text-muted)">평균</span>
        <span style="font-size:13px;font-weight:800;color:${color}">${Math.round(avg)}점</span>
      </div>
      <div style="display:flex;align-items:center;gap:6px;margin-top:6px;padding-top:5px;border-top:1px solid var(--border);flex-wrap:wrap">
        <span style="font-size:11px;color:var(--text-muted)">강점</span>
        <span style="padding:2px 8px;border-radius:10px;background:#e8f5e9;color:#2e7d32;font-size:11px;font-weight:700">${ITEMS[maxIdx]}</span>
        <span style="font-size:11px;color:var(--text-muted);margin-left:2px">보완</span>
        <span style="padding:2px 8px;border-radius:10px;background:#fff3e0;color:#e65100;font-size:11px;font-weight:700">${ITEMS[minIdx]||'-'}</span>
      </div>
    </div>`;

  loadRadarComments(safeKey,sabun,name);
}

async function loadRadarComments(safeKey,sabun,name){
  const person=persons.find(p=>(sabun&&p.sabun===sabun)||p.name===name);
  if(!person) return;
  for(let i=0;i<4;i++){
    const q=['Q1','Q2','Q3','Q4'][i];
    const docKey=`eval_${activeQuarter.year}_${q}`;
    const previewEl=document.getElementById(`comment-${safeKey}-${i}-preview`);
    const bodyEl=document.getElementById(`comment-body-${safeKey}-${i}`);
    if(!previewEl||!bodyEl) continue;
    let qData=radarDataCache[`${safeKey}_${q}`];
    if(!qData){
      try{const doc=await db.collection('evalData').doc(docKey).get();qData=doc.exists?doc.data().data:{};radarDataCache[`${safeKey}_${q}`]=qData;}
      catch(e){qData=JSON.parse(localStorage.getItem(docKey)||'{}');}
    }
    const d=qData[person.no];
    const comment=d?(d.comment||''):'';
    if(!comment){previewEl.textContent='서술 평가 없음';bodyEl.innerHTML='<span style="color:var(--text-muted)">해당 분기 서술 평가가 없습니다.</span>';}
    else{previewEl.textContent=comment.length>40?comment.slice(0,40)+'...':comment;bodyEl.textContent=comment;}
  }
}

function toggleComment(bodyId,arrowId){
  const body=document.getElementById(bodyId);
  const arrow=document.getElementById(arrowId);
  if(!body) return;
  const open=body.style.display==='none';
  body.style.display=open?'block':'none';
  if(arrow) arrow.style.transform=open?'rotate(180deg)':'';
}

function toggleAttend(safeKey) {
  const body  = document.getElementById('attend-body-'  + safeKey);
  const arrow = document.getElementById('attend-arrow-' + safeKey);
  if (!body) return;
  const open = body.style.display === 'none';
  body.style.display  = open ? 'block' : 'none';
  if (arrow) arrow.style.transform = open ? 'rotate(180deg)' : '';
}

  const overlay = document.getElementById('mbo-modal-overlay');
  const title   = document.getElementById('mbo-modal-title');

  const empty   = document.getElementById('mbo-modal-empty');
  if (!overlay) return;
  title.textContent = label + ' MBO';
  if (b64) {
    frame.src = b64;
    frame.style.display = 'block';
    empty.style.display = 'none';
  } else {
    frame.src = '';
    frame.style.display = 'none';
    empty.style.display = 'block';
  }
  overlay.style.display = 'flex';
}
function closeMboModal() {
  const overlay = document.getElementById('mbo-modal-overlay');
  if (overlay) { overlay.style.display = 'none'; }
  const frame = document.getElementById('mbo-modal-frame');
  if (frame) frame.src = '';
}
// ESC 키로 닫기
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeMboModal(); });

function hrSetResult(id, type, msg) {
  const el = document.getElementById(id);
  if (!el) return;
  el.className = 'upload-result ' + (type==='ok'?'upload-ok':'upload-warn');
  el.innerHTML = msg; el.style.display = 'block';
}

// ══ 분기 관리 ══
async function setActiveQuarter() {
  const y = parseInt(document.getElementById('aq-year').value);
  const q = parseInt(document.getElementById('aq-quarter').value);
  if (!confirm(`활성 분기를 ${y}년 ${q}분기로 변경하시겠습니까?\n\n변경 후 평가 입력이 새 분기로 전환됩니다.`)) return;
  activeQuarter = {year:y, quarter:q};
  try {
    await db.collection('system').doc('config').set({activeQuarter});
  } catch(e) { console.warn(e); }
  // 새 분기 evalData 로드
  evalData = await loadQuarterData(y, q);
  persons.forEach(p => {
    if (!evalData[p.no]) evalData[p.no] = {g1:'',g2:'',g3:'',g4:'',g5:'',comment:'',cGrade:'',done:false};
  });
  updateQuarterUI();
  renderAdminOverview();
  showToast(`✅ ${y}년 ${q}분기로 전환됐습니다.`);
}

function updateQuarterUI() {
  const badge = document.getElementById('aq-badge');
  if (badge) badge.textContent = `${activeQuarter.year}년 ${activeQuarter.quarter}분기 활성`;
  const ysel = document.getElementById('aq-year');
  const qsel = document.getElementById('aq-quarter');
  if (ysel) ysel.value = activeQuarter.year;
  if (qsel) qsel.value = activeQuarter.quarter;
  // 과거 분기 드롭다운 갱신
  const vsel = document.getElementById('view-quarter-sel');
  if (vsel) {
    vsel.innerHTML = '<option value="">현재 분기 보기</option>';
    const years = [2024,2025,2026,2027];
    years.forEach(y => {
      [1,2,3,4].forEach(q => {
        if (y < activeQuarter.year || (y===activeQuarter.year && q < activeQuarter.quarter)) {
          vsel.innerHTML += `<option value="${y}_${q}">${y}년 ${q}분기</option>`;
        }
      });
    });
  }
  // topbar 분기 표시 업데이트
  const sub = document.getElementById('topbar-sub');
  if (sub && currentUser) {
    const org = currentUser.role==='admin' ? '관리자' : (currentUser.dept||'');
    sub.textContent = org;
  }
}

let viewingQuarterData = null; // 과거 분기 조회 중이면 해당 데이터
async function loadViewQuarter() {
  const sel = document.getElementById('view-quarter-sel');
  const val = sel ? sel.value : '';
  if (!val) {
    viewingQuarterData = null;
    renderAdminOverview();
    renderResult();
    showToast('현재 분기로 돌아왔습니다.');
    return;
  }
  const [y, q] = val.split('_').map(Number);
  showToast(`${y}년 ${q}분기 데이터 불러오는 중...`);
  viewingQuarterData = await loadQuarterData(y, q);
  renderAdminOverview();
  renderResult();
  showToast(`✅ ${y}년 ${q}분기 조회 중`);
}

// 현재 화면에서 쓸 evalData (조회 모드면 과거 데이터)
function getDisplayEvalData() {
  return viewingQuarterData || evalData;
}

// ══ CSV EXPORT ══
function exportCSV(){
  let rows=['순번,이름,직책,직책년차,담당평가자,점수,등급,인센티브,서술등급,상태'];
  persons.forEach((p,i)=>{
    const d=evalData[p.no]||{}; const score=calcScore(d); const grade=calcGrade(score);
    const incv=score!==null?isIncentive(grade,p.nyeoncha)?'지급':'미지급':'미평가';
    rows.push(`${i+1},${p.name},${p.jikchek},${p.nyeoncha},${getEvaluatorName(p.evaluatorId)},${score||''},${grade||''},${incv},${d.cGrade||''},${d.done?'완료':'미완료'}`);
  });
  const blob=new Blob(['\uFEFF'+rows.join('\n')],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='26년1분기직책자평가결과.csv'; a.click();
  showToast('📥 CSV 파일 다운로드 완료');
}

// ══ TOAST ══
function showToast(msg){
  const t=document.getElementById('toast'); t.textContent=msg;
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2800);
}

// ══ MODAL OUTSIDE CLICK ══
['modal-person','modal-account'].forEach(id=>{
  document.getElementById(id).addEventListener('click',function(e){if(e.target===this){this.classList.remove('show');}});
});
